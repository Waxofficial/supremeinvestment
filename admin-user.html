<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Users - Supreme Live Investment</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0d1117;
      color:white;
    }

    /* SIDEBAR */
    .sidebar{
      position:fixed;
      width:240px;
      height:100%;
      background:#161b22;
      padding-top:30px;
    }

    .sidebar h2{
      color:gold;
      text-align:center;
      margin-bottom:40px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:15px 25px;
      transition:0.3s;
    }

    .sidebar a:hover{
      background:gold;
      color:black;
    }

    /* MAIN */
    .main{
      margin-left:240px;
      padding:30px;
    }

    h1{
      color:gold;
      margin-bottom:20px;
    }

    .section-box{
      background:#161b22;
      padding:25px;
      border-radius:10px;
      border:1px solid #333;
      margin-bottom:30px;
    }

    .search-bar{
      margin-bottom:20px;
    }

    .search-bar input{
      width:100%;
      padding:12px;
      border-radius:6px;
      border:1px solid #333;
      background:#0d1117;
      color:white;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    table th, table td{
      padding:15px;
      border-bottom:1px solid #333;
      text-align:left;
    }

    table th{
      color:gold;
    }

    .btn{
      padding:8px 15px;
      background:gold;
      color:black;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-weight:bold;
      margin-right:5px;
    }

    .btn-danger{
      background:#ff4d4d;
      color:white;
    }

    .status-active{
      color:lightgreen;
      font-weight:bold;
    }

    .status-suspended{
      color:#ff4d4d;
      font-weight:bold;
    }

    @media(max-width:768px){
      .sidebar{
        width:100%;
        height:auto;
        position:relative;
      }
      .main{
        margin-left:0;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Admin Panel</h2>

    <a href="admin-dashboard.html">Dashboard</a>

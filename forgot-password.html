<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Supreme Investment</title>

  <style>
    body{background:#0d1117;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;}
    .card{background:#161b22;padding:35px;border-radius:10px;width:350px;}
    h2{text-align:center;color:gold;margin-bottom:20px;}
    label{color:gold;font-weight:bold;margin-top:10px;display:block;}
    input{width:100%;padding:12px;margin-top:8px;border-radius:5px;border:1px solid #333;background:#0d1117;color:white;}
    .btn{margin-top:20px;padding:12px;width:100%;background:gold;color:black;border:none;border-radius:5px;font-weight:bold;cursor:pointer;}
    .btn:hover{background:#d4af37;}
  </style>
</head>

<body>

  <div class="card">
    <h2>Reset Password</h2>

    <label>Email</label>
    <input type="email" placeholder="Enter your email">

    <button class="btn" onclick="window.location.href='reset-password.html'">Send Reset Link</button>
  </div>

</body>
</html>

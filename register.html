<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Supreme Live Investment</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#0d1117;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .register-box{
      background:#161b22;
      padding:40px;
      border-radius:10px;
      width:350px;
      text-align:center;
    }

    h2{
      color:gold;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:5px;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:5px;
      background:gold;
      color:black;
      font-weight:bold;
      cursor:pointer;
      margin-top:15px;
    }

    button:hover{
      opacity:0.9;
    }

    p{
      margin-top:20px;
    }

    a{
      color:gold;
      text-decoration:none;
    }
  </style>
</head>

<body>

  <div class="register-box">

    <h2>Create Account</h2>

    <form>

      <input type="text" placeholder="Full Name" required>

      <input type="email" placeholder="Email Address" required>

      <input type="password" placeholder="Password" required>

      <input type="password" placeholder="Confirm Password" required>

      <button type="submit">
        Register
      </button>
    </form>
   <p>
      Already have an account?
      <a href="login.html">Login</a>
    </p>

  </div>

</body>
</html>
